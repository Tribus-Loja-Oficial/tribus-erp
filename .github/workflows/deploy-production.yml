name: Deploy production — Cloudflare Workers

on:
  workflow_run:
    workflows: ["Build & quality checks"]
    types:
      - completed

concurrency:
  group: cf-production
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  production:
    name: Wrangler Deploy Production
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    environment: PROD
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ vars.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Paths relevant for production deploy
        id: paths
        run: |
          set -euo pipefail
          FILES=$(git diff-tree --no-commit-id --name-only -r -m HEAD | sort -u)
          echo "Files in commit:"
          echo "$FILES"
          if [ -z "$FILES" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$FILES" | grep -qE '^(apps/erp-api/src/|apps/erp-api/package\.json|apps/erp-api/tsconfig\.json|apps/erp-api/wrangler\.toml|package\.json|package-lock\.json)'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No app-relevant paths; skipping production deploy."
          fi

      - name: Setup Node.js
        if: steps.paths.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.paths.outputs.skip != 'true'
        run: npm ci

      - name: Run migrations (D1 remoto)
        if: steps.paths.outputs.skip != 'true'
        working-directory: apps/erp-api
        run: npx wrangler d1 migrations apply TRIBUS_ERP_DB --env production --remote

      - name: Deploy to Cloudflare Workers
        if: steps.paths.outputs.skip != 'true'
        working-directory: apps/erp-api
        run: npx wrangler deploy --env production
