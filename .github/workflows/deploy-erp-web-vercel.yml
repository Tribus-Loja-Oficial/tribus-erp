name: Deploy — ERP Web (Vercel)

# Roda após "Build & quality checks" ser concluído com sucesso.
# - Push para main  → deploy de produção
# - Pull request    → deploy de preview
# - workflow_dispatch → deploy de produção manual
#
# Usa abordagem simplificada do tribus-storefront: vercel deploy direto
# A Vercel faz o build automaticamente em seus servidores.

on:
  workflow_run:
    workflows: ["Build & quality checks"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-erp-web-vercel
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy-production:
    name: Vercel Production (ERP Web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: PROD
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ERP_API_URL: ${{ vars.ERP_API_URL }}
      ERP_API_INTERNAL_SECRET: ${{ vars.ERP_API_INTERNAL_SECRET }}
      AUTH_SECRET: ${{ vars.AUTH_SECRET }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy ERP Web to Vercel (production)
        run: npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"

  deploy-preview:
    name: Vercel Preview (ERP Web)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: PROD
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ERP_API_URL: ${{ vars.ERP_API_URL }}
      ERP_API_INTERNAL_SECRET: ${{ vars.ERP_API_INTERNAL_SECRET }}
      AUTH_SECRET: ${{ vars.AUTH_SECRET }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ vars.VERCEL_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy ERP Web to Vercel (preview)
        run: npx --yes vercel@latest deploy --yes --token "$VERCEL_TOKEN"

